syntax = "proto3";

package minidog;

import "google/protobuf/timestamp.proto";

option go_package = "generated/minidogpb";

enum LogLevel {
  INFO = 0;
  WARN = 1;
  ERROR = 2;
  DEBUG = 3;
}

message LogEntryRequest {
  string id = 1;
  string agent_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  LogLevel level = 4;
  string msg = 5;
}

message LogEntryResponse {
  bool ok = 1;
}

message LogSummary {
  int32 total_records_processed = 1;
  bool is_successful = 2;
}

service LogCollector {
  // unary
  rpc SendLog(LogEntryRequest) returns (LogEntryResponse);

  // client
  rpc SubmitLogs(stream LogEntryRequest) returns (LogSummary);

  //bidi
  rpc StreamLogs(stream LogEntryRequest) returns (stream LogEntryResponse);
}
